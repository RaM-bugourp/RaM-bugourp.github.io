<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">RaM's Blog</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="archive.html">归档</a>
                <a href="friends.html">友链</a>
                <a href="about.html">关于</a>
                <a href="https://github.com/RaM-bugourp" target="_blank">GitHub</a>
            </div>
        </div>
    </nav>

    <div class="main-grid">
        <main id="archiveContent"></main>

        <aside class="sidebar">
            <div class="profile-card">
                <img class="avatar-img" src="images/OIP.webp" alt="RaM头像">
                <div class="profile-name">RaM</div>
                <div class="profile-bio">全栈开发 · Agent人柱力</div>
                <div class="profile-bio">热爱代码，喜欢折腾</div>
            </div>

            <div class="stats-card">
                <div class="card-title">📊 站点统计</div>
                <ul class="stats-list">
                    <li><span>文章总数</span><span id="postCount">3</span></li>
                    <li><span>标签数量</span><span>6</span></li>
                </ul>
            </div>
        </aside>
    </div>
</div>

<script>
    // 归档页独立脚本（不引用 main.js，避免冲突）
    const articleList = [
        { id: "post1", title: "Django Vue AdminX 框架开发实战", date: "2026-03-22" },
        { id: "post2", title: "如何成为一名ACMer", date: "2026-03-23" },
        { id: "post3", title: "VibeCoding · 个人开发者的AI时代生存指南", date: "2026-03-18" },
        { id: "post4", title: "你想活出怎么样的人生", date: "2026-03-25", tag: ":)", excerpt: "每个人都会死的，所以来看电视吧", tags: "#o.O " },
        { id: "post5", title: "我想当个数字游民", date: "2026-03-26", tag: "个人开发", excerpt: "你准备什么时候开始呢？", tags: "#全栈 " },
        { id: "post6", title: "关于 BuGroup ，关于我们", date: "2026-03-29", tag: "BuGroup", excerpt: "BuGroup 是由我和 Witherwithwinter 创办的独立组织。", tags: "#组织" },
        { id: "post7", title: "哈希？数据泄露的最后一道防线", date: "2026-03-30", tag: "backend", excerpt: "盐是啥？哈希又是啥", tags: "#salt" }, 
        { id: "post8", title: "日志是谁，为什么要打他", date: "2026-04-01", tag: "backend", excerpt: "我一进来就看见常威在打日志", tags: "#log" } ,
         { id: "post9", title: "我讨厌减脂期", date: "2026-04-02", tag: "rlog", excerpt: "好久没吃黄焖鸡了", tags: "#rlog" }
    ];

    function renderArchivePage() {
        const grouped = {};
        articleList.forEach(article => {
            const year = article.date.slice(0, 4);
            const month = article.date.slice(5, 7);
            if (!grouped[year]) grouped[year] = {};
            if (!grouped[year][month]) grouped[year][month] = [];
            grouped[year][month].push(article);
        });
        
        let html = '<div class="archive-list">';
        for (const year of Object.keys(grouped).sort().reverse()) {
            html += `<div class="archive-year">${year}年</div>`;
            for (const month of Object.keys(grouped[year]).sort().reverse()) {
                html += `<div class="archive-month">
                    <div class="archive-month-title">${month}月</div>
                    <ul class="archive-items">`;
                for (const article of grouped[year][month]) {
                    html += `<li><a href="posts/${article.id}.html">${article.title}</a><span class="archive-date">${article.date}</span></li>`;
                }
                html += `</ul></div>`;
            }
        }
        html += '</div>';
        document.getElementById('archiveContent').innerHTML = html;
    }
    
    renderArchivePage();
</script>
</body>
</html>
